<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>contacts</title>
</head>

<body class="relative min-h-screen  bg-black">

    <!-- Grid -->
    <div class="absolute inset-0
    bg-[linear-gradient(rgba(255,255,255,0.08)_1px,transparent_1px),linear-gradient(to_right,rgba(255,255,255,0.08)_1px,transparent_1px)]
    bg-[size:150px_150px]
    z-0
    [mask-image:linear-gradient(to_bottom,white,transparent)]">
    </div>
    <div class="snow absolute inset-0 z-10"></div>
    <!-- top shade -->
    <div
        class="absolute z-[-100] top-[-150px] left-[13%] w-[80%] h-[200px] rounded-full blur-[200px] bg-gradient-to-r from-violet-700 via-purple-600 to-pink-500 shadow-[0_0_80px_rgba(168,85,247,0.5)]">
    </div>
    <!-- navigation -->
    <div class="relative z-20 max-w-[1200px] mx-auto px-4">
        <nav class=" m-auto py-4 relative z-20">
            <div class=" py-5 flex flex-col md:flex-row flex-wrap gap-5 md:gap-2 justify-between items-center">
                <p
                    class=" inline-block font-bold text-3xl md:text-5xl bg-gradient-to-r from-violet-600 to-pink-600 bg-clip-text text-transparent">
                    Pranto&lt;/&gt;</p>
                <div
                    class="font-bold text-xl md:text-2xl text-pink-600 flex flex-row flex-wrap justify-center items-center gap-4 md:gap-8">
                    <a href="index.html">Home</a>
                    <a href="About.html">About</a>
                    <a href="skills.html">Skills</a>
                    <a href="projects.html">Projects</a>
                    <a href="contacts.html">Contact</a>
                </div>
            </div>
        </nav>
        <!-- contents -->
        <div class="w-full h-[105vh] md:h-[95vh] flex justify-center items-center">
            <div class="h-full w-full md:w-[60%] backdrop-blur-xs">
                <form class="w-full p-4 md:p-8">
                    <fieldset class="border-2 border-gray-300 p-6 rounded-xl">
                        <legend class="text-center px-3 text-lg font-bold text-white">Account Details</legend>

                        <div class="mb-5">
                            <label for="username" class="block text-sm md:text-xl mb-4 font-medium text-white">Your
                                Name</label>
                            <input type="text" id="username" placeholder="Enter your name"
                                class="w-full p-4 border border-white rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all text-white bg-transparent">
                        </div>

                        <div class="mb-5">
                            <label for="useremail" class="block text-sm md:text-xl mb-4 font-medium text-white">Your
                                Email</label>
                            <input type="email" id="useremail" placeholder="Enter your email"
                                class="w-full p-4 border border-white rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all text-white bg-transparent">
                        </div>

                        <div class="mb-5">
                            <label for="usermessage" class="block text-sm md:text-xl mb-4 font-medium text-white">Your
                                Message</label>

                            <textarea id="usermessage" rows="4" placeholder="Enter your message"
                                class="w-full p-4 h-32 border border-white rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500 transition-all text-white bg-transparent resize-y"></textarea>
                        </div>

                        <button type="submit"
                            class="w-full bg-pink-700 hover:bg-violet-700 text-white font-medium py-4 px-4 rounded-lg transition-colors cursor-pointer">
                            Submit
                        </button>
                    </fieldset>
                </form>
                <div class="flex justify-center items-center gap-2 md:gap-4 text-pink-700 text-xl md:text-2xl">
                    <a href="https://www.facebook.com/pranto.ghosh.96387/"><i
                            class="fa-brands fa-facebook hover:scale-125 transition-all duration-300"></i></a>
                    <a href="https://www.instagram.com/prantoghosh1294/"><i
                            class="fa-brands fa-instagram hover:scale-125 transition-all duration-300"></i></a>
                    <a href="https://github.com/prantoas8002-ship-it"><i
                            class="fa-brands fa-github hover:scale-125 transition-all duration-300"></i></a>
                    <a href="https://www.linkedin.com/in/pranto-ghosh-741807300/?skipRedirect=true"><i
                            class="fa-brands fa-linkedin hover:scale-125 transition-all duration-300"></i></a>
                </div>
            </div>
        </div>
        <!-- footer section -->
        <footer class="border border-t-gray-700 w-full mt-6  md:mt-8">
            <div>
                <p class="text-center p-4 text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-pink-500">
                    © All Rights Reserved. <br> Pranto 2026
                </p>
            </div>
        </footer>
    </div>
</body>

</html>
